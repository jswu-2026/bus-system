<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新生醫專校車搭車查詢系統</title>
<style>
:root {
  --blue:#0284c7;
  --cyan:#06b6d4;
  --bg:#e6f4ff;
  --text:#0f172a;
  --muted:#64748b;
  --line:#d9e2ec;
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;
  background:linear-gradient(180deg,#e0f2fe,#f8fafc 240px);
  color:var(--text);
}
.wrap {
  max-width: 760px;
  margin: 0 auto;
  padding: 16px 12px 28px;
}
.hero {
  background: rgba(255,255,255,.96);
  border:1px solid #dbeafe;
  border-radius:24px;
  padding:16px;
  box-shadow:0 8px 24px rgba(2,132,199,.08);
}
.top {
  display:flex;
  align-items:center;
  gap:14px;
}
.logo {
  width:72px;
  height:72px;
  object-fit:contain;
  border-radius:50%;
  background:#fff;
}
h1 {
  margin:0;
  font-size:24px;
  font-weight:900;
}
.sub {
  margin-top:4px;
  font-size:14px;
  color:var(--muted);
}
.notice {
  margin-top:14px;
  background:#fff3cd;
  padding:12px;
  border-radius:14px;
  line-height:1.7;
  font-size:13px;
}
.example {
  margin-top:10px;
  background:#fff;
  border:1px solid var(--line);
  padding:10px 12px;
  border-radius:14px;
  color:#666;
  font-size:13px;
}
.controls {
  display:grid;
  gap:10px;
  margin-top:12px;
}
input, select {
  width:100%;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid #d1d5db;
  background:#fff;
  font-size:15px;
}
.chips-wrap {
  margin-top:2px;
}
.chips-title {
  font-size:13px;
  color:var(--muted);
  margin-bottom:8px;
}
.chips-scroll {
  display:flex;
  gap:8px;
  overflow:auto;
  padding-bottom:4px;
}
.chip {
  white-space:nowrap;
  border:1px solid var(--line);
  background:#fff;
  color:#334155;
  border-radius:999px;
  padding:8px 12px;
  cursor:pointer;
  font-size:14px;
}
.chip.active {
  background:var(--blue);
  color:#fff;
  border-color:var(--blue);
}
.row2 {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.meta {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:16px 2px 8px;
  color:var(--muted);
  font-size:14px;
}
.badge {
  background:#e0f2fe;
  color:#0369a1;
  border-radius:999px;
  padding:6px 10px;
  font-weight:800;
}
.recommend-box {
  background:#dff6ff;
  border:1px solid #b6e6ff;
  padding:14px;
  border-radius:16px;
  margin-bottom:14px;
}
.recommend-title {
  font-weight:900;
  margin-bottom:8px;
}
.recommend-item {
  background:#fff;
  border-radius:12px;
  padding:10px 12px;
  margin-bottom:8px;
  line-height:1.7;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}
.group {
  margin-top:16px;
}
.group-title {
  display:flex;
  gap:8px;
  align-items:center;
  margin:0 2px 10px;
  font-size:14px;
  font-weight:900;
  color:#334155;
}
.dot {
  width:10px;
  height:10px;
  border-radius:999px;
  background:#0ea5e9;
}
.gcount {
  font-size:11px;
  color:var(--muted);
  border:1px solid var(--line);
  background:#fff;
  border-radius:999px;
  padding:2px 8px;
}
.card {
  background:#fff;
  padding:15px;
  border-radius:16px;
  margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  border:1px solid #edf2f7;
}
.card-head {
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
}
.stop {
  font-size:18px;
  font-weight:900;
}
.area {
  color:#64748b;
  font-size:12px;
  margin-bottom:4px;
}
.time {
  background:linear-gradient(90deg,var(--blue),var(--cyan));
  color:#fff;
  border-radius:14px;
  padding:8px 10px;
  font-size:14px;
  font-weight:900;
  min-width:82px;
  text-align:center;
}
.tag {
  display:inline-block;
  margin-top:10px;
  background:#fef3c7;
  color:#92400e;
  border-radius:999px;
  padding:6px 10px;
  font-size:12px;
  font-weight:800;
}
.addr {
  margin-top:10px;
  background:#f8fafc;
  border-radius:14px;
  padding:12px;
  line-height:1.7;
  font-size:14px;
}
.actions {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}
.action {
  display:inline-block;
  text-decoration:none;
  text-align:center;
  padding:11px 12px;
  border-radius:12px;
  font-size:14px;
  font-weight:800;
}
.copy { background:#0f172a; color:#fff; border:none; cursor:pointer; }
.nav { background:var(--blue); color:#fff; }
.empty {
  background:#fff;
  border:1px dashed #cbd5e1;
  border-radius:20px;
  padding:16px;
  color:#475569;
}
.footer {
  margin-top:16px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:20px;
  padding:14px;
  line-height:1.8;
  color:#475569;
}
@media (max-width:640px) {
  .row2 { grid-template-columns:1fr; }
  .top { align-items:flex-start; }
  h1 { font-size:22px; }
}
</style>
</head>

const areaSelect = document.getElementById("area");
const busSelect = document.getElementById("bus");
const resultDiv = document.getElementById("result");
const recommendDiv = document.getElementById("recommend");
const searchInput = document.getElementById("search");
const countEl = document.getElementById("count");
const areaButtons = document.getElementById("areaButtons");

function uniq(arr) {
  const m = {};
  const out = [];
  arr.forEach(v => {
    if (!v) return;
    if (!m[v]) {
      m[v] = 1;
      out.push(v);
    }
  });
  return out.sort();
}

function esc(s) {
  return String(s ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function mapLink(addr) {
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(addr || '');
}

function copyText(text) {
  navigator.clipboard.writeText(text || "").then(() => alert("已複製地址")).catch(() => alert("複製失敗，請手動複製"));
}

function extractTokens(q) {
  return q
    .replace(/附近/g,"")
    .replace(/路口/g,"")
    .split(/[\s、，,\/\-]+/)
    .map(s => s.trim())
    .filter(Boolean);
}

const allAreas = ["全部區域"].concat(uniq(data.map(d => d["區域"])));
areaSelect.innerHTML = allAreas.map(a => `<option>${a}</option>`).join("");

function refreshAreaButtons() {
  areaButtons.innerHTML = "";
  allAreas.forEach((area, idx) => {
    const btn = document.createElement("button");
    btn.className = "chip" + (idx === 0 ? " active" : "");
    btn.textContent = area;
    btn.onclick = function() {
      areaSelect.value = area;
      Array.from(areaButtons.children).forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      refreshBusOptions();
      filter();
    };
    areaButtons.appendChild(btn);
  });
}

function syncAreaButtonState() {
  Array.from(areaButtons.children).forEach(btn => {
    if (btn.textContent === areaSelect.value) btn.classList.add("active");
    else btn.classList.remove("active");
  });
}

function refreshBusOptions() {
  const currentArea = areaSelect.value;
  const filteredBuses = uniq(
    data
      .filter(d => currentArea === "全部區域" || d["區域"] === currentArea)
      .map(d => d["車號"])
  );
  const currentBus = busSelect.value || "全部車號";
  busSelect.innerHTML = `<option>全部車號</option>` + filteredBuses.map(b => `<option>${b}</option>`).join("");
  if ([...busSelect.options].some(o => o.value === currentBus)) {
    busSelect.value = currentBus;
  } else {
    busSelect.value = "全部車號";
  }
}

function scoreStation(item, keyword, selectedArea) {
  let score = 0;
  const q = keyword.trim();

  if (selectedArea !== "全部區域" && item["區域"] === selectedArea) score += 50;
  if (!q) return score;

  if ((item["地址"] || "").includes(q)) score += 40;
  if ((item["站別"] || "").includes(q)) score += 35;
  if ((item["區域"] || "").includes(q)) score += 30;

  const tokens = extractTokens(q);
  tokens.forEach(t => {
    if ((item["地址"] || "").includes(t)) score += 15;
    if ((item["站別"] || "").includes(t)) score += 12;
    if ((item["區域"] || "").includes(t)) score += 10;
  });

  return score;
}

function renderRecommendations(keyword, selectedArea) {
  const q = keyword.trim();

  if (!q && selectedArea === "全部區域") {
    recommendDiv.innerHTML = "";
    return;
  }

  const scored = data
    .map(d => Object.assign({}, d, { score: scoreStation(d, q, selectedArea) }))
    .filter(d => d.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 3);

  if (!scored.length) {
    recommendDiv.innerHTML = "";
    return;
  }

  let html = `<div class="recommend-box"><div class="recommend-title">推薦前 3 站</div>`;
  scored.forEach((d, idx) => {
    html += `
      <div class="recommend-item">
        <b>推薦 ${idx + 1}：${esc(d["站別"])}</b><br>
        區域：${esc(d["區域"])}<br>
        車號：${esc(d["車號"])}<br>
        時間：${esc(d["時間"])}<br>
        地址：${esc(d["地址"])}
      </div>`;
  });
  html += `</div>`;
  recommendDiv.innerHTML = html;
}

function render(list) {
  countEl.textContent = list.length + " 筆";

  if (!list.length) {
    resultDiv.innerHTML = `<div class="empty">查無符合資料</div>`;
    return;
  }

  const grouped = {};
  list.forEach(d => {
    const key = d["區域"] || "未分類";
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(d);
  });

  let html = "";
  Object.keys(grouped).forEach(group => {
    const items = grouped[group];
    html += `<div class="group">`;
    html += `<div class="group-title"><span class="dot"></span><span>${esc(group)}</span><span class="gcount">${items.length} 站</span></div>`;
    items.forEach(d => {
      html += `
      <div class="card">
        <div class="card-head">
          <div>
            <div class="area">${esc(d["區域"])}</div>
            <div class="stop">${esc(d["站別"])}</div>
          </div>
          <div class="time">${esc(d["時間"])}</div>
        </div>
        <div class="tag">車號 ${esc(d["車號"])}</div>
        <div class="addr"><b>搭車點地址</b><br>${esc(d["地址"])}</div>
        <div class="actions">
          <button class="action copy" data-copy="${encodeURIComponent(d["地址"] || "")}">複製地址</button>
          <a class="action nav" href="${mapLink(d["地址"] || d["站別"])}" target="_blank">導航</a>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  resultDiv.innerHTML = html;

  resultDiv.querySelectorAll("[data-copy]").forEach(btn => {
    btn.onclick = () => copyText(decodeURIComponent(btn.getAttribute("data-copy")));
  });
}

function filter() {
  const q = searchInput.value.trim();
  const area = areaSelect.value;
  const bus = busSelect.value;

  const result = data.filter(d => {
    return (area === "全部區域" || d["區域"] === area)
      && (bus === "全部車號" || d["車號"].includes(bus))
      && (
        q === "" ||
        (d["站別"] || "").includes(q) ||
        (d["地址"] || "").includes(q) ||
        (d["區域"] || "").includes(q)
      );
  });

  renderRecommendations(q, area);
  render(result);
}

areaSelect.addEventListener("change", () => {
  syncAreaButtonState();
  refreshBusOptions();
  filter();
});
busSelect.addEventListener("change", filter);
searchInput.addEventListener("input", filter);

refreshAreaButtons();
refreshBusOptions();
render(data);
</script>
</body>
</html>
