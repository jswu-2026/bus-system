<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新生醫專校車搭車查詢系統</title>

<style>
body{
  margin:0;
  font-family:"Microsoft JhengHei";
  background:#e6f4ff;
}
.wrap{max-width:760px;margin:auto;padding:12px}
h1{text-align:center}

.notice{
  background:#fff3cd;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  font-size:14px;
  line-height:1.7;
}

.locbtn{
  width:100%;
  padding:12px;
  background:#0284c7;
  color:#fff;
  border:none;
  border-radius:10px;
  margin-bottom:10px;
}

.row2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.addr-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1.2fr;
  gap:10px;
  margin-top:10px;
}

input,select{
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  width:100%;
}

.card{
  background:#fff;
  padding:10px;
  border-radius:12px;
  margin:8px 0;
}

@media(max-width:640px){
  .row2{grid-template-columns:1fr}
  .addr-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="wrap">

<h1>新生醫專校車查詢系統</h1>

<div class="notice">
<b>說明</b><br>
1：請先依區域找站點<br>
2：若不易判斷，請輸入地址（縣市、區、路）<br>
3：請提早5分鐘到站
</div>

<button class="locbtn" onclick="useLocation()">📍 使用目前位置找最近站</button>

<div class="row2">
<select id="area"></select>
<select id="bus"></select>
</div>

<div class="addr-grid">
<input id="city" placeholder="桃園市">
<input id="dist" placeholder="中壢">
<input id="road" placeholder="中正">
</div>

<div id="recommend"></div>
<div id="result"></div>

</div>

<script>

// ⚠️ 這裡放你的282站資料
const data = YOUR_DATA_HERE;

// 車號精準比對
function matchBus(busText, selectedBus){
  if(selectedBus==="全部車號") return true;
  return String(busText).split("、").includes(selectedBus);
}

// 建立查詢字串
function getQuery(){
  return city.value + dist.value + "區" + road.value + "路";
}

// 查詢
function filter(){
  let q=getQuery();
  let areaVal=area.value;
  let busVal=bus.value;

  let res=data.filter(d=>{
    return (areaVal==="全部區域"||d.區域===areaVal)
    && matchBus(d.車號,busVal)
    && (q===""||d.地址.includes(road.value));
  });

  render(res);
}

// 顯示
function render(list){
  result.innerHTML="";
  if(list.length===0){
    result.innerHTML="查無資料";
    return;
  }

  list.forEach(d=>{
    result.innerHTML+=`
    <div class="card">
    <b>${d.站別}</b><br>
    車號:${d.車號}<br>
    時間:${d.時間}<br>
    地址:${d.地址}
    </div>`;
  });
}

// 定位
function useLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    alert("定位成功(示意版)");
  });
}

</script>
</body>
</html>
