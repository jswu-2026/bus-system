<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新生醫專校車搭車查詢系統</title>

<style>
body{margin:0;font-family:"Microsoft JhengHei","Noto Sans TC";background:#e6f4ff;}
.wrap{max-width:760px;margin:auto;padding:16px;}

h1{text-align:center;margin-bottom:10px;}

.notice{
  background:#fff3cd;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
  line-height:1.7;
}

.chips{display:flex;gap:8px;overflow:auto;margin-bottom:10px;}
.chip{padding:8px 14px;border-radius:20px;border:1px solid #ccc;background:#fff;cursor:pointer;}
.chip.active{background:#0284c7;color:#fff;}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}

select{padding:12px;border-radius:10px;border:1px solid #ccc;width:100%;}

.card{background:#fff;padding:14px;border-radius:14px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,0.08);}

.time{color:#0284c7;font-weight:bold;}

.footer{margin-top:16px;background:#fff;padding:12px;border-radius:12px;}

@media(max-width:640px){
  .row2{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="wrap">

<h1>新生醫專校車搭車查詢系統</h1>

<div class="notice">
<b>說明</b><br>
說明1：請依區域找出距離住家較近的搭車站點。<br>
說明2：請同學提早5分鐘到站等車。
</div>

<div class="chips" id="areaButtons"></div>

<div class="row2">
<select id="area"></select>
<select id="bus"></select>
</div>

<div id="result"></div>

<div class="footer">
備註：「＆、∪」表示鄰接街道，「Δ」表示對向街道。
</div>

</div>

<script>

// ⚠️ 請貼上你的282站資料
const data = YOUR_DATA_HERE;

function matchBus(busText, selectedBus){
  if(selectedBus==="全部車號") return true;
  return String(busText).split("、").map(b=>b.trim()).includes(selectedBus);
}

const areaSelect=document.getElementById("area");
const busSelect=document.getElementById("bus");
const resultDiv=document.getElementById("result");
const areaButtons=document.getElementById("areaButtons");

const areas=["全部區域",...new Set(data.map(d=>d.區域))];
areaSelect.innerHTML=areas.map(a=>`<option>${a}</option>`).join("");

areas.forEach((a,i)=>{
  let btn=document.createElement("button");
  btn.className="chip"+(i==0?" active":"");
  btn.innerText=a;
  btn.onclick=()=>{
    areaSelect.value=a;
    document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
    btn.classList.add("active");
    updateBus();
    filter();
  }
  areaButtons.appendChild(btn);
});

function updateBus(){
  let list=[];
  data.forEach(d=>{
    if(areaSelect.value==="全部區域"||d.區域===areaSelect.value){
      String(d.車號).split("、").forEach(b=>list.push(b.trim()));
    }
  });

  let unique=[...new Set(list)].sort((a,b)=>Number(a)-Number(b));

  busSelect.innerHTML="<option>全部車號</option>"+unique.map(b=>`<option>${b}</option>`).join("");
}

function filter(){
  let area=areaSelect.value;
  let bus=busSelect.value;

  let res=data.filter(d=>{
    return (area==="全部區域"||d.區域===area)
      && matchBus(d.車號,bus);
  });

  render(res);
}

function render(list){
  resultDiv.innerHTML="";

  if(list.length===0){
    resultDiv.innerHTML="<div class='card'>查無資料</div>";
    return;
  }

  list.forEach(d=>{
    resultDiv.innerHTML+=`
    <div class="card">
      <b>${d.站別}</b><br>
      區域：${d.區域}<br>
      車號：${d.車號}<br>
      <span class="time">時間：${d.時間}</span><br>
      地址：${d.地址}
    </div>`;
  });
}

updateBus();
filter();

areaSelect.onchange=()=>{
  updateBus();
  filter();
};

busSelect.onchange=filter;

</script>
</body>
</html>
