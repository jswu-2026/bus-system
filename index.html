<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新生醫專校車搭車查詢系統</title>
<style>
:root{
  --blue:#1677c8; --blue-dark:#0f4d84; --chip:#e8eff7; --line:#c8d7e8;
  --text:#0f172a; --muted:#64748b; --bg:#f6f8fb; --card:#ffffff;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;color:var(--text);background:var(--bg)}
.page{max-width:980px;margin:0 auto;padding:18px 14px 28px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.logo{width:64px;height:64px;flex:0 0 64px;border-radius:50%}
.title-wrap h1{margin:0;font-size:30px;line-height:1.15}
.title-wrap .sub{margin-top:4px;color:var(--muted);font-size:14px}
.notice,.panel,.footer,.card,.empty{background:#fff}
.notice{border:1px solid var(--line);border-radius:18px;padding:12px 16px;margin-bottom:16px;line-height:1.85;box-shadow:0 8px 20px rgba(15,23,42,.04)}
.layout{display:grid;grid-template-columns:1fr;gap:16px}
.panel{border:1px solid var(--line);border-radius:26px;padding:20px;box-shadow:0 8px 20px rgba(15,23,42,.04)}
.panel h2{margin:0 0 14px;font-size:22px}
.chips{display:flex;flex-wrap:wrap;gap:14px}
.chip{border:none;background:var(--chip);color:var(--blue-dark);border-radius:999px;padding:16px 22px;font-size:16px;font-weight:900;cursor:pointer}
.chip.active{background:var(--blue);color:#fff}
.field-grid{display:grid;grid-template-columns:1fr;gap:12px}
.field label{display:block;margin:0 0 8px;color:var(--muted);font-size:15px}
select{width:100%;padding:16px 18px;border:1px solid #b8c8da;border-radius:18px;font-size:16px;background:#fff}
.btn-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.btn{border:none;border-radius:18px;padding:16px 24px;background:var(--blue);color:#fff;font-size:16px;font-weight:900;cursor:pointer}
.btn.secondary{background:#eef4fa;color:var(--blue-dark);border:1px solid #d8e3ee}
.meta{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:16px 2px 10px;color:var(--muted);font-size:14px}
.badge{display:inline-flex;align-items:center;gap:8px;background:#e8f2fb;color:var(--blue-dark);border-radius:999px;padding:8px 14px;font-weight:900}
.result-list{display:grid;gap:12px}
.card{border:1px solid #d9e4ee;border-radius:18px;padding:16px;box-shadow:0 4px 14px rgba(15,23,42,.04)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.area{color:var(--muted);font-size:13px;font-weight:800;margin-bottom:4px}
.stop{font-size:22px;font-weight:900;line-height:1.25}
.time{white-space:nowrap;background:#edf5ff;color:#0f355a;border-radius:12px;padding:8px 12px;font-weight:900}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.tag{background:#f6f8fb;color:#334155;border:1px solid #d9e4ee;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:800}
.addr{line-height:1.8;color:#334155}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.action{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:12px;padding:11px 14px;font-size:14px;font-weight:900;cursor:pointer;text-decoration:none}
.copy{background:#eef2f7;color:#0f172a}
.nav{background:var(--blue);color:#fff}
.empty{border:1px dashed #c6d7e6;border-radius:18px;padding:24px 18px;text-align:center;color:var(--muted)}
.footer{margin-top:16px;font-size:13px;color:#475569;border:1px solid #d9e4ee;border-radius:16px;padding:12px 14px}
@media (max-width:720px){
  .title-wrap h1{font-size:24px}
  .panel{padding:16px}
  .chip{padding:13px 18px;font-size:15px}
  .card-head{flex-direction:column}
  .time{white-space:normal}
}
</style>
</head>

const areaSelect = document.getElementById('areaSelect');
const busSelect = document.getElementById('busSelect');
const areaButtons = document.getElementById('areaButtons');
const result = document.getElementById('result');
const countBadge = document.getElementById('countBadge');
const statusText = document.getElementById('statusText');

function uniqueSorted(arr) {
  return [...new Set(arr)].sort((a,b)=>a.localeCompare(b, 'zh-Hant'));
}
function busSort(a,b) {
  const na = parseInt(String(a).match(/\d+/)?.[0] || 9999, 10);
  const nb = parseInt(String(b).match(/\d+/)?.[0] || 9999, 10);
  return na - nb || String(a).localeCompare(String(b), 'zh-Hant');
}
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function mapUrl(addr, stop) {
  const q = encodeURIComponent(`${stop} ${addr}`);
  return `https://www.google.com/maps/search/?api=1&query=${q}`;
}
function copyText(text) {
  navigator.clipboard.writeText(text)
    .then(() => alert('地址已複製'))
    .catch(() => alert('複製失敗，請手動複製'));
}

const areas = uniqueSorted(DATA.map(d => d.area));
const buses = [...new Set(DATA.map(d => d.bus))].sort(busSort);

function fillSelects() {
  areaSelect.innerHTML = '<option value="">全部區域</option>' +
    areas.map(a => `<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join('');
  busSelect.innerHTML = '<option value="">全部車號</option>' +
    buses.map(b => `<option value="${escapeHtml(b)}">${escapeHtml(b)}</option>`).join('');
}
function renderAreaButtons() {
  areaButtons.innerHTML = areas.map(a =>
    `<button class="chip" data-area="${escapeHtml(a)}">${escapeHtml(a)}</button>`
  ).join('');
  document.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      areaSelect.value = btn.dataset.area;
      setActiveArea(btn.dataset.area);
      renderResults();
    });
  });
}
function setActiveArea(area) {
  document.querySelectorAll('.chip').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.area === area && area !== '');
  });
}
function filteredData() {
  const area = areaSelect.value;
  const bus = busSelect.value;
  return DATA.filter(d => (!area || d.area === area) && (!bus || d.bus === bus));
}
function renderResults() {
  const rows = filteredData();

  const bus = busSelect.value;
  let status = '已顯示全部站點';
  if (area && bus) status = `目前條件：${area}／${bus} 號車`;
  else if (area) status = `目前條件：${area}`;
  else if (bus) status = `目前條件：${bus} 號車`;
  statusText.textContent = status;

  if (!rows.length) {
    result.innerHTML = '<div class="empty">查無符合條件的站點資料</div>';
    return;
  }

  result.innerHTML = rows.map((d, idx) => `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="area">${escapeHtml(d.area)}</div>
          <div class="stop">${escapeHtml(d.stop)}</div>
        </div>
        <div class="time">${escapeHtml(d.time)}　${escapeHtml(d.bus)} 號車</div>
      </div>
      <div class="tags">
        <span class="tag">車號：${escapeHtml(d.bus)}</span>
        ${d.route ? `<span class="tag">路線：${escapeHtml(d.route)}</span>` : ''}
      </div>
      <div class="addr">${escapeHtml(d.addr || '—')}</div>
      <div class="actions">
        <button class="action copy" data-copy="${idx}">複製地址</button>
        <a class="action nav" href="${mapUrl(d.addr, d.stop)}" target="_blank" rel="noopener">地圖導航</a>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('[data-copy]').forEach(btn => {
    btn.addEventListener('click', () => {
      const row = rows[Number(btn.dataset.copy)];
      copyText(row.addr || '');
    });
  });
}

areaSelect.addEventListener('change', () => {
  setActiveArea(areaSelect.value);
  renderResults();
});
busSelect.addEventListener('change', renderResults);
document.getElementById('showAllBtn').addEventListener('click', () => {
  areaSelect.value = '';
  busSelect.value = '';
  setActiveArea('');
  renderResults();
});
document.getElementById('clearBtn').addEventListener('click', () => {
  areaSelect.value = '';
  busSelect.value = '';
  setActiveArea('');
  renderResults();
});

fillSelects();
renderAreaButtons();
renderResults();
</script>
</body>
</html>
