<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>校車搭車查詢系統</title>
<style>
body { font-family: Arial; padding:20px; }
select, button { margin:5px; padding:5px; }
.result { margin-top:20px; }
</style>
</head>
<body>

<h2>校車搭車查詢系統</h2>

<select id="area">
<option value="">請選擇地區</option>
<option>桃園市桃園區</option>
<option>桃園市觀音區</option>
<option>桃園市中壢區</option>
<option>桃園市平鎮區</option>
<option>桃園市大溪區</option>
<option>桃園市新屋區</option>
<option>桃園市八德區</option>
<option>台北板橋火車站</option>
<option>新竹市區</option>
<option>新竹縣芎林鄉</option>
<option>新竹縣橫山鄉</option>
<option>新竹縣新埔鎮</option>
<option>新竹縣湖口鄉</option>
</select>

<button onclick="search()">查詢</button>

<div class="result" id="result"></div>

<script>
const data = {
"桃園市桃園區": "寶慶南平路口(21,54)",
"桃園市觀音區": "新坡國小(12)",
"桃園市中壢區": "中華後華街口(6,56)、內壢火車站(3,6)、忠貞市場(4,50)、清埔/青埔站(36)、高鐵桃園站(3,4)、萬能科大(2)",
"桃園市平鎮區": "中豐路段(5,69)",
"桃園市大溪區": "介壽路口(59)",
"桃園市新屋區": "新屋區公所(9,49)",
"桃園市八德區": "青年活動中心/方便站(23)、高城社區(6)",
"台北板橋火車站": "板橋火車站(60,61)",
"新竹市區": "新竹火車站(31,32)",
"新竹縣芎林鄉": "五龍方便站(15)",
"新竹縣橫山鄉": "橫山方便站1(39)、橫山方便站2(2)",
"新竹縣新埔鎮": "文山農會路口(40)、新關路方便站(40)",
"新竹縣湖口鄉": "達生路橋(14,25)"
};

function search(){
let area = document.getElementById("area").value;
let result = document.getElementById("result");
if(data[area]){
result.innerHTML = "<b>站點：</b>" + data[area];
}else{
result.innerHTML = "查無資料";
}
}
</script>

</body>
</html>
